# VPS deployment — with Caddy (automatic HTTPS via Let's Encrypt)
# 1. Set your domain in deploy/Caddyfile
# 2. Usage: docker compose -f deploy/docker-compose.caddy.yml --env-file .env up -d

services:
  agent:
    build:
      context: ..
      dockerfile: Dockerfile
    expose:
      - "3001"
    environment:
      - AGENT_TOKENS=${AGENT_TOKENS}
      - AGENT_REGION=${AGENT_REGION:-unknown}
      - PORT=3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - agent
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
